body:
  text: 島夷志略地理類十外紀之屬提要臣等謹案島夷志略一卷元汪大淵撰大淵字焕章南昌人至正中嘗附賈舶浮海越數十國紀所聞見成此書今以明馬觀瀛涯勝覽互勘如觀所稱占城之人頂三山金花冠衣皆縈綵帨産伽南香觀音竹降真香之屬瓜哇之厮村沽灘新村蘇馬魯隘港口諸處風土各異又其國人有三等其土産有白芝麻緑豆蘇木金剛子白檀肉豆䓻龜筒玳瑁紅緑鸚鵡之屬舊港有火雞神鹿之屬皆為此書所未載又所載真臘物産較元周達真臘風土記亦僅十之四五蓋殊方絶域偶一維舟斷不能周覽無遺所見各殊則所記各别不足異也至云瓜哇即古闍婆考明史明太祖時瓜哇闍婆二國並來貢其二國國王之名亦不同大淵併而為一則傳聞之誤矣然諸史外國列𫝊秉筆之人皆未嘗身厯其地即趙汝適諸蕃志之類亦多得於市舶之口傳大淵此書則皆親厯而手記之究非空談無徵者比故所記羅衛羅斛針路諸國大半為史所不載又於諸國山川險要方域疆里一一記述即載於史者亦不及所言之詳録之亦足資考證也考黃虞稷千頃堂書目及焦竑國史經籍志皆不載是書唯錢曾讀書敏求記載之稱為元人舊鈔本則此書久無刋板傳播殊稀又稱至正年間河東張翥三山吳鑒為之序今考此本二人之序俱存然吳鑒序乃有二篇前一篇題至正己丑乃此書原序後一篇題至正十一年在前序後二年乃所作清源續志之序誤入此書蓋吳鑒修志之時以泉州為海道所通賈舶所聚因附刋此書於志末摘録者併志序鈔之也又有嘉靖戊申袁表跋頗議其漏載日本蓋未悉大淵此書惟紀所見非海國全志云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀島夷志略原序九海環大瀛海而中國曰赤縣神州其外為州者復九有禆海環之人民禽獸莫能相通如一區中者乃為一州此騶氏之言也人多疑其荒唐誕誇况當時外徼未通於中國將何以徵驗其言哉漢唐而後於諸島夷力所可到利所可到班班史傳固有其名矣然考於見聞多襲舊書未有身遊目識而能詳記其實者猶未盡徵之也西江汪君焕章當冠年嘗兩附舶東西洋所遇輒采録其山川風土物産之詭異居室飲食衣服之好尚與夫貿易賫用之所宜非其親見不書則信乎其可徴也與又言海中自多巨魚若蛟龍鯨鯢之屬羣出遊鼓濤距風莫可名數舟人燔雞毛以觸之則逺遊而沒一島嶼間或廣袤數千里島人浩穰其君長所居多明珠麗玉犀角象牙香木為飾橋梁或甃以金銀若珊瑚琅玕玳瑁人不以為竒也所言由有可觀則騶衍皆不誕焉知是志之外焕章之所未歷不有瑰怪廣大又逾此為國者歟大抵一元之􅉋充溢乎天地其所能融結為人為物惟中國文明則得其正氣環海於外氣偏於物而寒燠殊候材質異賦固其理也今乃以耳目弗逮而盡疑之可乎莊周有言六合之外聖人存而不論然博古君子求之異書亦所不廢也泉修郡乘既以是志刋入之焕章將歸復刋諸西江以廣其傳故豫序之至正十年龍集庚寅二月朔日翰林修撰河東張翥叙中國之外四州維海之外夷國以萬計唯北海以風惡不可入東西南數千萬里皆得梯航以達其道路象胥以譯其語言惟有聖人在乎位則相率而效朝貢通互市雖天際窮髮不毛之地無不可通之理焉世祖皇帝既平宋氏始命正奉大夫工部尚書海外諸蕃宣慰使蒲師文與其副孫勝夫尤永賢等通道外國撫宣諸夷獨瓜哇負固不服遂命平章高興史弼等帥舟師以討定之自時厥後唐人之商販者外蕃率待以命使臣之禮故其國俗土産人物竒怪之事中土皆得而知竒珍異寶流布中外為不少矣然欲考求其故實則熟事者多祕其說鑿空者又不得其詳唯豫章汪君焕章少負竒氣為司馬子長之遊足跡幾半天下矣顧以海外之風土國史未盡其藴因附船以浮於海者數年然後歸其目所及皆為書以記之較之五年舊志大有徑庭矣以君傳者其言必可信故附録清源續志之後不惟使後之圖王㑹者有足徵亦以見國家之懷柔百蠻蓋此道也至正己丑冬十月又二望日三山吳鍳序島夷志略序古有九丘之書志九州之土地所有風氣之宜與三墳五典並傳周列國皆有史晉有乘輿楚有檮杌魯之春秋是也孔子定書以黜三墳衍述職方以代九丘筆削春秋以寓一王法而乘輿檮杌遂廢不傳及秦罷侯置守廢列國史漢馬遷作史記闕牧守年月不表郡國記載浸無可考學者病之厥後江表華陽有志汝潁之名士襄陽之耆舊有傳隋大業首命學士十八人著十郡志凡以補史氏之闕遺也閩文學始唐至宋大盛故家文獻彬彬可考時號海濱洙泗蓋不誣矣國朝混一區域至元丙子郡既內附繼遭兵寇郡域之外奔為戰區雖值承平未能盡復舊觀觀清源前志放夫後志上於淳佑庚戌逮今百有餘年前政牧守多文吏武夫急簿書期㑹而不遑於典章文物比年修宋遼金三史詔郡各國上所録而泉獨不能具無以稱德意有識愧焉至正九年潮以閩海憲使髙昌偰侯來守泉臨政之暇考求啚志領是邦古今政治沿革風土習尚變遷不同太平百年譜牒猶有遺逸矣今不紀後將無徵遂分命儒生搜訪舊聞隨邑編輯成書鑒時寓泉辱命與學士君子裁定刪削為清源續志二十卷以補清源故事然故老澌愚新學淺於聞見前朝遺事蓋十具一二以傳言至正十一年暮春修禊日三山吳鑒序欽定四庫全書島夷志略元汪大淵撰彭湖島分三十有六巨細相間坡隴相望乃有七澳居其間各得其名自泉州順風二晝夜可至有草無木土瘠不宜禾稻泉人結茅為屋居之氣候常暖風俗朴野人多眉夀男女穿長布衫繫以土布煮海為鹽釀秫為酒採魚蝦螺蛤以佐食爇牛糞以爨魚膏為油地産胡麻緑豆山羊之孳生數萬為羣家以烙毛刻角為記晝夜不收各遂其生育土商興販以樂其利地𨽻泉州晉江縣至元年間立巡檢司以周嵗額辦鹽課中統錢鈔一十錠二十五兩别無科差琉球地勢盤穹林木合抱山曰翠麓曰重曼曰斧頭曰大峙其峙山極高峻自彭湖望之甚近余登此山則觀海潮之消長夜半則望晹谷之出紅光燭天山頂為之俱明土潤田沃宜稼穡氣候漸暖俗與彭湖差異水無舟楫以筏濟之男子婦人拳髮以花布為衫煮海水為鹽釀蔗漿為酒知畨主酋長之尊有父子骨肉之義他國之人倘有所犯則生割其肉以啖之取其頭懸木竿地産沙金黃豆麥子硫黃黃蠟鹿豹麂皮貿易之貨用土珠瑪瑙金珠粗碗處州磁器之屬海外諸國蓋由此始三島居大竒山之東嶼分鼎峙有疊山層巒民傍緣居之田瘠穀少俗質朴氣候差暖男女間有白者男頂拳婦人椎髻俱披單衣男子嘗附船至泉州經紀罄其資囊以文其身既歸其國則國人以尊長之禮待之延之上座雖父老亦不得與爭焉習俗以其至唐故貴之也民煮海為鹽釀蔗漿為酒有酋長地産黃蠟木綿花布貿易之貨用銅珠青白花碗小花印布鐵塊之屬次曰答陪曰海贍曰巴弄吉曰蒲里咾曰東流里無甚異産故附此耳麻逸山勢平寬夾溪聚落田膏腴氣候稍暖俗尚節義男女椎髻穿青布衫凡婦葬夫則削其髮絶食七日與夫同寢多瀕於死七日之外不死則親戚勸以飲食或可全生則終身不改其節甚至喪夫而焚尸則赴火而死酋豪之喪則殺奴婢二三十人以殉葬民煮海為鹽釀糖水為酒地産木綿黃蠟玳瑁檳榔花布貿易之貨用鼎鐵塊五采紅布紅絹牙錠之屬蠻賈議價領去傳易土貨然後准價舶商守信如終如始不負約也無枝拔在闞麻羅華之東南石山對峙民墾闢山為田鮮食多種薯氣候常熱獨春有微寒俗直男女編髮纒頭繫細紅布極以婚姻為重往往指腹成親通國守義如有失信者罰金二兩重以納其主民煮海為鹽釀椰漿蕨粉為酒有酋長産花斗錫鉛緑毛狗貿易之貨用西洋布青白處州瓷器瓦壜鐵鼎之屬龍涎嶼嶼方而平延袤荒野上如雲塢之盤絶無田産之利每值天清氣和風作浪湧羣龍游戲出沒海濵時吐涎沫於其嶼之上故以得名涎之色或黑於烏香或類於浮石聞之微有腥氣然用之合諸香則味尤清遠雖茄藍木梅花腦檀麝機子花沉速末薔薇水衆香必待此以發之此地前代無人居之間有他畨之人用完木鑿舟駕使以拾之轉鬻於他國貨用金銀之屬博之交趾古交州之地今為安南大越國山環而險溪道互布外有三十六莊地廣人稠氣候常熱田多沃饒俗尚禮義有中國之風男女面白而齒黑戴冠穿唐衣皂褶絲襪方履凡民間俊秀子弟八嵗入小學十五入大學其誦詩讀書談性理為文章皆與中國同惟言語差異耳古今嵗貢中國已載諸史民煮海為鹽釀秫為酒部長以同闕為妻地産沙金白銀銅錫鉛象牙翠毛肉桂檳榔貿易之貨用諸色綾羅匹帛青布牙梳紙扎青銅鐵之類流通使用銅錢民間以六十七錢折中統銀一兩官用止七十為率舶人不販其地惟偷販之舟止於斷山上下不得至其官場恐中國人窺見其國之虛實也占城地據海衝與新舊州為鄰氣候乍熱田中上等宜種穀俗喜侵掠嵗以上下元日縱諸人採生人膽以鬻官家官以銀售之以膽調酒與家人同飲云通身是膽使人畏之亦不生疵癘也城之下水多洄旋舶往復數日止舟載婦人登舶與舶人為偶及去則垂涕而别明年舶人至則偶合如故或有遭難流落於其地者則婦人推舊情以飲食衣服供其身歸則又重贐以送之蓋有情義如此仍禁服半似唐人日三四浴以腦射合油塗體以白字寫黑皮為文書煮海為鹽釀小米為酒地産紅柴茄藍木打布貨用青磁花碗金銀首飾酒色布燒珠之屬民多朗臨海要津溪通海水不鹹田沃饒米穀廣氣候熱俗尚儉男女椎髻穿短皂衫下繫青布短裙民鑿井而飲煮海為鹽釀小米為酒有酋長禁盜盜則戮及一家地産烏梨木射檀木綿花牛麂皮貨用漆器銅鼎闍婆布紅絹青布斗錫酒之屬賔童龍賔童龍𨽻占城土骨與占城相連有雙溪以間之佛書所稱王舍城是也或云目連屋基猶存田土人物風俗氣候與占城略同人死則持孝服設佛擇僻地以葬之國主騎象或馬打紅傘從者百餘人執盾讚唱曰亞或僕畨語也其尸頭蠻女子害人甚於占城故民多廟事而血祭之蠻亦父母胎生與女子不異特眼中無瞳人遇夜則飛頭食人糞尖頭飛去若人以紙或布掩其項則頭歸不接而死凡人居其地大便後必用水净浣否則蠻食其糞即逐臭與人同睡倘有所犯則腸肚皆為所食精神盡為所奪而死矣地産茄藍木象牙貨用銀印花布次曰胡麻沙曼頭羅沙犗寶毗齊新故越州諸畨無所産舶亦不至真臘州南之門實為都㑹有城周圍七十餘里石河周圍廣二十丈戰象幾四十餘萬殿宇凡三十餘所極其壯麗飾以金璧鋪銀為磚置七寶椅以待其主貴人貴戚所坐皆金杌嵗一㑹則以玉猿金孔雀六牙白象三角銀蹄牛羅獻於前列金獅子十隻於銅臺上列十二銀塔鎮以銅象人凡飲食必以金茶盤籩豆金碗貯物用之外名百塔洲作為金浮屠百座一座為狗所觸則造塔頂不成次曰馬司録池復建五浮屠黃金為尖次曰桑香佛舍造褁金石橋四十餘丈諺云富貴真臘者也氣候常暖俗尚華侈田産富饒民煮海為鹽釀小米為酒男女椎髻生女九嵗請僧作𣑽法以指挑童身取紅㸃女額及母額名為利市云如此則他日嫁人宜其室家也滿十嵗即嫁若其妻與客淫其夫甚喜誇於人我妻巧慧得人愛之也以錦圍身眉額施珠酋豪出入用金車羽儀體披瓔珞右手持劍左手持麈尾法則劓刖刺配之刑國人犯盜則斷手足烙胸背黥額殺唐人則死唐人殺畨人至死亦重罰金如無金以賣身取贖地産黃蠟犀角孔雀沉速香蘇木大楓子翠羽冠於各番貨用銀黃紅燒珠龍段建寧錦絲布之屬丹馬令地與沙里佛來安為鄰國山平亘田多食粟有餘新收者復留以待陳俗節儉氣候溫和男女椎髻衣白衣衫繫青布縵定婚用假錦白錫若干塊民煮海為鹽釀小米為酒有酋長産上等白錫米腦龜筒鶴頂降真香及黃熟香頭貿易之貨用甘理布紅布青白花碗鼓之屬日麗介兩山之間立一閧之市田雖平曠春乾而夏雨種植常違其時故嵗少稔仰食於他國氣候冬暖風俗尚節義男女椎髻白縵纒頭繫小黃布男喪妻不嫁煮海為鹽釀漿為酒有酋長土産龜筒鶴頂降真錫貿易之貨用青磁器花布粗碗鐵塊小印花闕之屬麻里嚕小港迢遞入於其地山隆而水多鹵股石林少田高而瘠民多種薯芋地氣熱俗尚義若畨官沒其婦再不嫁於凡夫必有他國畨官之子孫閥閲相稱者方可擇配否則削髮看經以終其身男女拳髮穿青布短衫繫紅布縵民煮海為鹽釀蔗漿為酒編竹片為床燃生蠟為燈地産玳瑁黃蠟降香行布木綿花貿易之貨用牙靛青布青磁器盤處州磁水壜大甕鐵鼎之屬遐來勿古泪之下山盤數百里厥田中下俗尚妖怪氣候春夏秋熱冬微冷則人無病反此則瘴生人畜死男女挽髻纒紅布繫青綿布梢凡人死則研生腦調水灌之以養其尸欲葬而不腐民煮海為鹽釀椰漿為酒有酋長地産蘇木玳瑁木綿花檳榔貿易之貨用占城海南布鐵線銅鼎紅絹五色布木梳箆子青器粗碗之屬彭坑石崖周匝﨑嶇遠如平寨田沃穀稍登氣候半熱風俗與丁家盧小異男女椎髻穿長布衫繫單布稍富貴女頂帶金圈數四常人以五色焇珠為圈以束之凡講婚姻互造換白銀五錢重為准民煮海為鹽釀椰漿為酒有酋長地産黃熟香頭沉速打白香腦子花錫粗降真貿易之貨用諸色絹闍婆布銅鐵器漆磁器鼓板之屬吉蘭丹地勢博大山瘠而田少夏熟而倍收氣候平熱風俗尚禮男女束髮穿短衫繫皂布縵每遇四時節序生辰婚嫁之類衣紅布長衫為慶民煮海為鹽織木綿為業有酋長地産上等沉速粗降真香黃蠟龜筒鶴頂檳榔外有小港索遷極深水鹹魚美出花錫貨用塘頭市布占城布青盤花碗紅緑焇珠琴阮鼓板之屬丁家盧三角嶼對境港口通其津要山高曠田中下民食足春多雨氣候微熱風俗尚怪男女椎髻穿緑纈布短衫繫遮里絹刻神木為神殺人血和酒祭之每水旱疫癘禱之則立應及婚姻病喪則卜其吉凶亦驗今部長主事貪婪勤儉守土地産降真腦子黃蠟玳瑁貨用青白花磁器占城布小紅絹斗錫酒之屬戎山繞溪環部落坦夷田畬成片土脈膏腴氣候不正春夏苦雨俗陋男女方頭兒生之後以木板四方夾之二周後去其板四季祝髮以布縵繞身以椰水浸秫米半月方成酒味極苦辣而味長二月海榴結實復釀榴實酒味甘酸宜解渴地産白豆䓻象牙翠毛黃蠟木綿紗貿易之貨用銅漆器青白花碗磁壺瓶花銀紫焇珠巫崙布之屬羅衛南真駱之南實加羅山即故名也山瘠田美等為中上春末則禾登民有餘蓄以移他國氣候不時風俗勤儉男女文身為禮以紫縵纒頭繫溜布以竹筒實生蠟為燭織木綿為業煮海為鹽以葛根浸水釀酒味甘軟竟日飲之不醉有酋長地産粗降真玳瑁黃蠟棉花雖有珍樹無能割貿易之貨用棊子手巾狗跡絹五色燒珠花銀青白碗鐵條之屬羅斛山形如城郭白石峭厲其田平衍而多稼暹人仰之氣候常暖如春風俗徑悍男女椎髻白布纒頭穿長布衫每有議刑法錢穀出入之事並决之於婦人其志量常過於男子煮海為鹽釀秫米為酒有酋長法以􅖝子代錢流通行使每一萬凖中統鈔二十四兩甚便民此地産羅斛香味極清遠亞於沉香次蘇木犀角象牙翠羽黃蠟貨用青器花印布金錫海南檳榔口􅖝子次曰彌勒佛曰忽南圭曰善司坂曰蘇剌司坪曰吉力地無所産用附於此東冲古剌嶻嶭豐林下臨淡港外堞為之限介田美穀秀氣候驟熱雨下則微冷風俗輕剽男女斷髮紅手帕纒頭穿黃綿布短衫繫越里布凡有人喪亡者不焚化聚其骨撇於海中謂之種植法使子孫復有生意持孝之人齊戒數月而後已民不善煮海為鹽釀蔗漿為酒有酋長地産沙金黃蠟粗降真香龜筒沉香貿易之貨用花銀鹽青白花碗大小水埕青縀銅鼎之屬蘇洛鬲洛山如關并溪如帶具有聚落田瘠穀少氣候少暖風俗勇悍男女椎髻穿青布短衫繫木綿白縵凡生育後惡露不下汲井水澆頭即下有害熱症者亦皆用水沃數四則愈民煮海為鹽有酋長地産上等降真片腦鶴頂沉速玳瑁貿易之貨用青白花器海巫崙布銀鐵水埕小罐銅鼎之屬針路自馬軍山水路由麻來墳至此地則山多鹵股田下等少耕植民種薯及胡蘆西瓜兼採海螺螃蛤蝦食之內坪下小溪有魚蟹極美民間臨溪每一舉網輒食數日而有餘氣候差熱俗惡男女以紅綿布纒頭皂縵繫身民煮海為鹽織竹絲布為業有酋長地産芎蕉􅖝子通暹准錢使用貿易之貨用銅條鐵鼎銅珠五色焇珠大小埕花布鼓青布之屬八都馬閙市廣陽山茂田少民力齊常足食氣候暖俗尚朴男女椎髻纒青布縵繫甘理布酋長守土安民樂其生親沒必沭浴齊戒號泣半月而葬之日奉桑香佛唯謹有犯奸盜者梟之以示戒有遵蠻法者賞之以示勸俗稍稍近理地産象牙重者百餘斤輕者七十八十斤胡椒亞於闍婆貿易之貨用南北絲花銀赤金銅鐵鼎絲布草金緞丹山錦山紅絹白礬之屬淡邈小港去海口數里山如鐵筆迤邐如長蛇民傍緣而居田地平宜穀粟食有餘氣候暖風俗儉男女椎髻穿白布短衫繫竹布梢民多識山中草藥有疵癘之疾服之其效如神煮海為鹽事網罟為業地産胡椒亞於八都馬貨用黃硝珠麒麟粒西洋絲布粗碗青器銅鼎之屬尖山自有宇宙兹山盤據於小東洋卓然如文筆插霄漢雖懸隔數百里望之儼然田地少多種薯炊以代飯氣候煩熱風俗纎嗇男女斷髮以紅絹纒頭以佛南圭布纒身煮海為鹽釀蔗漿水米為酒地産木綿花竹布黃蠟粗降真沙地所生故不結實貿易之貨用牙錠銅鐵鼎青碗大小埕甕青皮單錦鼓樂之屬八節那間其邑臨海嶺方木瘦田地瘠宜種粟麥俗尚邪與湖北道澧州風俗同男女椎髻披白布縵繫以土布一嵗之間三月內民户採生以祭鬼酬願信不生灾害民煮海為鹽有酋長地産單花印布不退色木綿花檳榔貿易之貨用青器紫礦土粉青絲布埕甕鐵器之屬三佛齊自龍牙門去五晝夜至其國人多姓蒲習水陸戰官兵服藥刀兵不能傷以此雄諸國其地人烟稠密田土沃美氣候暖春夏常雨俗淳男女椎髻穿青綿布短衫繫東冲布喜潔净故於水上架屋採蚌蛤為鮓煮海為鹽釀秫為酒有酋長地産梅花片腦中等降真香檳榔木綿布細花木貿易之貨用色絹紅硝珠絲布花布銅鐵鍋之屬舊傳其國地忽穴出牛數萬人取食之後用竹木塞之乃絶嘯噴繇監毗吉陀以東其山延袤數千里結茅而居田沃宜種粟氣候常暖俗陋男女椎髻以藤皮煮軟織粗布為短衫以生布為梢地産唯蘇木盈山他物不見每嵗與打網國相通貿易通舶人貨用五色硝珠磁器銅鐵鍋牙錠瓦甕粗碗之屬勃泥龍山䃲磾於其右基宇雄敞原田獲利夏月稍冷冬乃極熱俗尚侈男女椎髻以五采繫腰花錦為衫崇奉佛像唯嚴尤敬愛唐人若醉則扶之以歸歇處民煮海為鹽釀秫為酒有酋長仍選其國能算者一人掌文簿計其出納收稅無纎毫之差焉地産降真黃蠟玳瑁梅花片腦其樹如杉檜劈裂而取之必齊浴而後往貨用白銀赤金色緞牙箱鐵器之屬明家羅故臨國之西山有三島中島桑香佛所居珍寶盈前人莫能取一島虎豹蛇虺縱橫人莫敢入一島土中紅石掘而取之其色紅活名鴉鶻也舶人興販往往金銀與之貿易土瘠宜種粟氣候大熱俗朴男女衣青單被民煮海為鹽有酋長地産紅石之外别物不見暹自新門臺入港外山﨑嶇內嶺深邃土瘠不宜耕種穀米嵗仰羅斛氣候不正尚侵掠每他國轉輸駕百十艘以沙糊滿載舍生而往務在必取近年以七十餘艘來侵單馬錫攻打城池一月不下本處閉關而守不敢與爭遇瓜哇使臣經過暹人聞知乃遁遂掠昔里而歸至正己丑夏五月降於羅斛凡人死則灌水銀以養其身男女衣著與羅斛同仍以􅖝子權錢使用地産蘇木花錫大風子象牙翠羽貿易之貨用硝珠水銀青布銅鐵之屬瓜哇瓜哇即古闍婆國門遮把逸山係官場所居宫室壯麗地廣人稠實甲東洋諸畨舊傳國王係雷震石中而出令女子為酋以長之其田膏沃地平衍榖米富饒倍於他國民不為盜道不拾遺諺云太平闍婆者此也俗朴男子椎髻褁打布惟酋長留髮大德年間伊克默色平章史弼髙興曽往其地令臣屬納稅貢立衙門振綱紀設鋪兵以遞文書守常刑重鹽法使銅錢俗以銀錫鍮銅雜鑄如螺甲大名為銀錢以權銅錢使用地産青鹽係晒成胡椒每嵗萬斤極細堅耐色印布及鸚鵡之類藥物皆自他國來也貨用硝珠金銀青縀色絹青白花碗鐵器之屬次曰巫崙曰希苓曰三打板曰吉丹曰孫剌等地無異産故附此耳重迦羅杜瓶之東曰重迦羅與瓜哇界相接間有髙山竒秀不産他木滿山皆鹽敷樹及楠樹內一石洞前後三門可容一二萬人田土亞於闍婆氣候熱俗淳男女撮髻衣長衫地産綿羊鸚鵡細花木綿單椰子木綿花紗貿易之貨用花銀花宣絹諸色布煮海為鹽釀秫為酒無酋長年尊者統攝次曰諸畨相去約數日水程曰孫陀曰琵琶曰丹重曰員嶠曰彭里不事耕種專尚寇掠與吉陀亞﨑諸國相通交易舶人所不及也都督崖自海腰平原津通淡港土薄田肥宜種穀廣栽薯芋氣候夏凉多淫雨春與秋冬皆熱俗尚節序男女椎髻穿絲布短衫繫白布梢民間每以正月三日長幼焚香拜天以酒牲祭山神之後長幼皆羅拜於庭名為慶節序不喜煮鹽釀蜜為酒有酋長地産片腦粗速香玳瑁龜筒貿易之貨用海南占城布紅緑絹鹽鐵銅鼎色縀之屬文誕渤山髙環溪水若淡田地瘠民半食沙糊椰子氣候苦熱俗淫男女椎髻露體繫青皮布梢日間畏熱不事布種月夕耕鋤漁獵採薪取水山無蛇虎之患家無盜賊之虞煮海為鹽釀椰漿為酒婦織木綿為業有酋長地産肉豆䓻黑小厮豆䓻花小丁皮貨用水綾絲布花印布烏瓶鼓瑟青磁器之屬蘇祿其地以石﨑山為堡障山畬田瘠宜種粟麥民食沙糊魚蝦螺蛤氣候半熱俗鄙薄男女斷髮纒皂縵繫小印花煮海為鹽釀蔗漿為酒織竹布為業有酋長地産中等降真條黃蠟玳瑁珍珠較之沙里八丹第三港等處所産此蘇䘵之珠色青白而圓其價甚昂中國人首飾用之其色不退號為絶品有徑寸者其出産之地大者已直七八百餘錠中者二三百錠小者一二十錠其餘小珠一萬上兩重者或一千至三四百上兩重者出於西洋之第三港此地無之貿易之貨用赤金花銀八都刺布青珠處器鐵條之屬龍牙犀角峯嶺內平而外聳民環居之如蟻附坡厥田下等氣候半熱俗厚男女椎髻齒白繫麻逸布俗以結親為重親戚之長者一日不見靣必攜酒持物以問勞之為長夜之飲不見其醉民煮海為鹽釀秫為酒有酋長地産沉香冠於諸畨次鶴頂降真蜜糖黃熟香頭貿易之貨用土印布八都剌布青白花之屬蘇門傍山如屏而石峭中有窩藏平坦地瘠田少多種麥而食氣候常暖俗鄙薄藉他畨以足其食賴商賈以資其國男女披長髮短衫為衣繫斯吉丹布煮海為鹽有酋長地産翠羽蘇木黃蠟檳榔貿易之貨用白糖巫崙布油絹衣花色宣絹塗油大小水埕之屬塗油出於東埕塗中熬晒而成舊港自淡港入彭家門民以竹代舟道多磚塔田利倍於他壤云一季種穀三年生金言其穀變而為金也後西洋人聞其田美闕來取田內之土骨以歸彼田為之脉而種穀舊港之田闕復生亦怪事也氣候稍熱男女椎髻以白布為梢煮海為鹽釀椰漿為酒有酋長地産黃熟香頭金顔香木綿花冠於諸畨黃蠟粗降真絶髙鶴頂中等沉速貿易之貨用門邦丸珠四色燒珠麒麟粒處瓷銅鼎五色布大小水埕甕之屬龍牙菩提環宇皆山石排類門無田耕種但栽薯芋蒸以代糧當收之時畨家必堆貯數屋如中原人積糧以供嵗用食餘則存防下年之不熟也園種果採蛤蚌魚蝦而食倍於薯芋氣候倍熱俗朴男女椎髻披木棉花單被煮海為鹽浸芋根汁以釀酒地産粗香檳榔椰子貿易之貨用紅緑燒珠牙箱錠鐵鼎青白土印布之屬毗舍耶僻居海東之一隅山平曠田地少不多種植氣候倍熱俗尚虜掠男女撮髻以墨汁刺身至頭頸項臂纒紅絹繫黃布為飾國無酋長地無出産時常褁乾糧棹小舟過外畨伏荒山窮谷無人之境遇捕魚採薪者輒生擒以歸鬻於他國每一人易金二兩重蓋彼國之人遞相倣效習以為業故東洋聞毗舍耶之名皆闕也闕卒地勢連龍牙門後山若纒若斷起凹峯而盤結故民環居焉田瘠穀少登氣候不齊夏則多雨而微寒俗質披短髮假錦纒頭紅油布繫身煮海為鹽釀米為酒有酋長地産上等鶴頂中等降真木綿花貿易之貨用絲布鐵條土印布赤金瓷器鐵鼎之屬蒲奔地控海濵山蹲白石不宜耕種嵗仰食於他國氣侯乍熱而微冷風俗果决男女青黑男垂髻女拳髻繫白縵民煮海為鹽採蟹黃為鮓以木板造舟藤篾固之以綿花塞縫底甚柔軟隨波上下以木為槳未嘗見有損壞有酋長地産白藤扶留藤檳榔貿易之貨用青瓷器粗碗海南布鐵線大小埕甕之屬假里馬打山列翠屏闤闠臨溪田下穀不收氣候熱俗澆薄男女髠頭以竹布為桶樣穿之仍繫以梢罔知亷恥採蕉實為食煮海為鹽以適他國易米每鹽一斤易米一斗地産畨羊髙大者可騎日行五六十里及紫玳瑁貿易之貨用硫磺珊瑚珠闍婆布青色燒闕布之屬入老古益溪通津地勢卑窄山林茂密田瘠稻慳氣候熱俗薄男女椎髻繫花竹布為稍以象齒樹之內室為供養之具民煮海為鹽取沙糊為食地産丁香其樹滿山然多不常生三年中間或二年熟有酋長地每嵗望唐舶販其地往往以五枚雞雛出必唐船一隻來二雞雛出必有二隻以此占之如響斯應貿易之貨用銀鐵水綾絲布巫崙八節那間布土印布象齒燒珠青磁器埕器之屬古里地悶居加羅之東北山無異木唯檀樹為最盛以銀鐵碗西洋絲布色絹之屬為之貿貨也地謂之馬頭凡十有二所有酋長田宜穀粟氣候不齊朝熱而夜冷風俗淫濫男女斷髮穿木綿短衫繫占城布市所酒肉價亷婦不知恥部領縱食而貪色醉酒之餘卧不覆被至者染疾多死倘在畨茍免回舟之際櫛風沐雨其疾發而為狂熱謂之隂陽交交則必死昔泉之吳宅發舶稍衆百有餘人到彼貿易既畢死者十八九間存一二爾多羸弱之力駕舟隨風回舶或時風恬浪息黃昏之際則狂魂蕩唱歌闕十則添炬曄耀使人魂遊而膽寒吁良可畏哉然則其闕縱有萬倍之利何益昔栁子厚謂海賈以生易利其有甚於此者乎龍牙門門以單馬錫畨兩山相交若龍牙門中有水道以間之田瘠稻少氣候熱四五月多淫雨俗好劫掠昔部長掘地而得玉冠嵗之始以見月為正初酋長戴冠披服受賀今亦遞相傳授男女兼中國人居之多椎髻穿短布衫繫青布稍産粗降真斗錫貿易之貨赤金青緞花布處磁器鐵鼎之類蓋以山無美林貢無異貨以通衆州之貿易皆剽竊之物也舶往西洋本畨置之不問回船之際至吉利門舶人須駕箭棚張布幕利器械以防之賊舟二三百隻必然來迎敵數日若僥幸順風或不遇之否則人為所戮貨為所有則人死係乎頃刻之間也崑崙古者崑崙山又名軍屯山山髙而方根盤幾百里截然乎瀛海之中與占城西竺鼎峙而相望下有崑崙洋因是名也舶販西洋者必掠之順風七晝夜可渡諺云上有七州下有崑崙計闕孰存雖則地無異産人無居室山之窩有男人數十闕異狀穴居而野處既無衣褐日食山果魚蝦夜則宿於樹巢仿標枝野鹿之世何以知其然也百舶阻惡風灣泊其山之下男女羣聚而玩撫掌而笑笑而去自適天趣吾故曰其無懷大庭氏之民歟其葛天氏之民歟靈山嶺峻而方石泉下咽民居星散以結網為活田野闢宜耕種一嵗凡二收榖舶至其所則船人齊沐三日具什事崇佛諷經燃水燈放彩舶以禳本舶之灾始度其下風俗氣候男女與占城同地産藤杖輕小黑文相對者為冠每條互易一花斗錫粗大而紋疏者一花斗錫互易三條舶之往復此地必汲水採薪以濟日用次得檳榔老葉餘無異物貿易之貨用粗碗燒珠鐵條之屬東西竺石上嵯峩形勢對峙地勢雖有東西之殊不啻蓬萊方丈之爭竒也田瘠不宜耕種嵗仰淡净米榖足食氣候不齊四五月淫雨而尚寒俗朴略男女斷髮繫占城布煮海為鹽釀椰漿為酒有酋長地産檳榔老葉椰子簟木綿花畨人取其椰心之嫩闕或染織而為簟售之唐人其簟冬暖而夏凉亦可闕貿易之貨用花錫胡椒鐵器薔薇露水之屬急水灣灣居石緑嶼之下其流奔騖舶之時月遲延兼以潮汐南北人莫能測舶洄漩於其中則一月莫能出昔有度元之舶流寓在其中二十餘日失風針迷舵折舶遂閣淺人船貨物俱各漂蕩偶遺三人於礁上者枵腹五日又且斷舶往來輒采礁上螺蚌食之當此之時命懸於天忽一日大木二根浮海而至礁傍人抱其木隨風飄至須門答剌之國幸而免溺焉花靣其山逶迤其地沮洳田極肥美足食有餘男女以墨汁刺於其靣故謂之花靣國名因之氣候倍熱俗淳有酋長地産牛羊雞鴨檳榔甘蔗老葉木綿貨用鐵條青布粗碗青處器之屬舶經其地不過貿易以供日用而已餘無可興販也淡洋港口通官場百有餘里洋其外海也內有大溪之水源二千餘里奔流衝合於海其海靣一流之水清淡舶人經過往往乏水則必由此汲之故名曰淡洋過此以往未見其海洋之水不鹹闕田常熟氣候熱風俗淳男女椎髻繫溜布有酋長地産闕與亞蘆同米顆雖小炊飯則香貿易之貨用赤金鐵器粗碗之屬須文答剌峻嶺掩抱地勢臨海田磽穀少風俗澆薄其部長人物修長一日之間必三變色或青或黑或赤每嵗必殺十餘人取自然血浴之則四時不生疾病故民皆畏服焉男女椎髻繫紅布土産腦子粗降真香味短鶴頂斗錫種茄樹髙丈有餘經三四年不萎生茄子以梯摘之如西瓜大重十餘斤貿易之貨用西洋絲布樟腦薔薇水黃油傘青布五色縀之屬僧加剌疊山環翠洋海橫絡其山之腰有佛殿巋然則釋迦佛肉身所在民從而像之逮今以香花燭事之若存海濵有石如蓮臺上有佛足跡長二尺有四寸闊七寸深五寸許蹟中海水入其內不鹹而淡味甘如醴病者飲之則愈老者飲之可以延年土人長七尺餘靣紫身黑眼巨而長手足溫潤而壯健宛然佛家種子夀多至百有餘嵗者佛初憐彼方之人貧而為盜故以善化其民復以甘露水灑其地産紅石土人掘之以左手取者為闕者設佛後得此以濟貿易之貨皆令溫飽而善良闕一鉢盂非玉非銅非鐵色紫而潤敲之有玻瓈聲故國初凡三遣使取之至是則舉浮屠之教以語人故未能免於儒者之議然觀其土人之梵相風俗之敦厚詎可弗信也夫交欄山嶺髙而樹林茂密田瘠穀少氣候熱俗射獵為事國初軍士征闍婆遭風於山下輒損舟一舟幸免唯存釘灰見其山多木故於其地造舟一十餘隻若檣柁若帆若篙靡不具備飄然長往有病卒百餘人不能去者遂留山中今唐人與畨人叢雜而居之男女椎髻穿短衫繫巫崙布地産熊豹鹿麂皮玳瑁貿易之貨用穀米色絹青布銅器青器之屬特畨里國居西南角名為小食官場深邃前有石崖當關以守之後有石洞周匝以居之厥土塗泥厥田沃饒臨溪溪又通海海口有閘春月則放水灌田耕種時雨降則閉閘或嵗旱則開焉民無水旱之憂長有豐稔之慶故號為樂土氣候應節俗淳男女椎髻繫青布煮海為鹽釀老葉為酒燒羊羔為闕黃蠟綿羊髙四尺許波羅大如斗甜瓜三四尺圍貿易之貨用麻逸布五色綢縀錦縀銅鼎紅油布之屬班逹里地與鬼屈波思國為鄰山峙而石盤田瘠穀少氣候微熱淫雨間作俗怪屋傍每有鬼夜啼如人聲相續至五更而啼止次日酋長必遣人乘騎鳴鑼以逐之卒不見其蹤影也厥後立廟宇於盤石之上以祭焉否則人畜有疾國必有灾男女丫髻繫巫崙布不事針縷紡績煮海為鹽地産甸子鴉忽石兜羅綿木綿花青䝉石貿易之貨用諸色縀青白磁鐵器五色燒珠之屬曼陀郎國界西北隅與播寧接壤地瘠宜種麥酋長七尺有餘二國勢均不事侵伐故纍世結姻頗有朱陳村之俗焉蠻貊之所僅聞他國之所未見者氣候少熱男女挽髻以白布包頭皂布為服以木犀花釀酒地産犀角木綿摘四斗花可重一斤西瓜五十斤重有餘石榴大如斗貿易之貨用丁香豆䓻良薑蓽茇五色布青器斗錫酒之屬喃哩地當喃哩之要衝大波如山動蕩日月望洋之際疑若無地民居環山各得其所男女椎髻露體繫稍布田瘠榖少氣候暖俗尚劫掠亞於牛單錫也地産鶴頂龜筒玳瑁降真香冠於各畨貿易之貨用金銀鐵器薔薇水紅絲布樟腦青白花碗之屬夫以舶歷風濤回經此國幸而免於魚龍之厄而又罹虎口莫能逃之其值風信之乖時使之然歟北溜地勢居下千嶼萬島舶往西洋過僧加剌傍潮流迅急更值風逆輒漂此國候次年夏東南風舶仍出溜水中有石槎牙利如鋒刃蓋已不闕舟矣地産椰子索􅖝子魚乾大手巾布海商每將一舶􅖝子下烏爹朋加剌必互易米一船有餘蓋彼畨以􅖝子權錢用亦久遠之食法也下里國居小㖵喃古里佛之中又名小港口山曠而原平地方數千餘里民所奠居星羅棊布家給人足厥田中下農力耕氣候暖風俗淳民尚氣出入必懸弓箭及牌以隨身男女削髮繫溜布地産胡椒冠於各畨不可勝計椒木滿山蔓衍如藤蘿冬花而夏實民採而蒸曝以乾為度其味辣採者多不禁其味之觸人甚至以川芎煎湯解之他畨之有胡椒者皆此國流波之餘也髙郎步大佛山之下灣環中縱橫皆鹵股石其地濕臯田瘠米穀翔貴氣候暖俗薄舶人不幸失風或駐閣於其地者徒為酋長之利舶中所有貨物多至全璧而歸之酋以為天賜也孰知舶人妻子饑寒之所望哉男女撮髻繫八郎那間布梢煮海為鹽釀蔗漿為酒有酋長地産紅石頭與僧加剌同貿易之貨用八丹布斗錫酒薔薇水蘇木金銀之屬沙里八丹國居古里佛山之後其地沃衍田少俗美氣候微暖男女繫布纒頭循海而居珠貨之馬頭也民有犯罪者以石灰畫圈於地使之立圈內不令轉足此其極刑也地産八丹布珍珠由第三港來皆物之所自産也其地採珠官抽畢皆以小舟渡此國互易富者用金銀以低價塌之舶至求售於唐人其利豈淺鮮哉金塔古崖之下聖井傍有塔十丈有餘塔頂曽鍍以金其頂頽而石爛惟苔蘚青青耳上有鶴巢寬七尺餘有朱頂雌雄二鶴長存人見每嵗常巢其上酋長子孫相傳以來千有餘年矣春則育一二雛及羽翼成飛去惟老鶴存焉國人書扁曰老鶴里土瘠而民貧氣候不齊俗朴男女椎髻纒白布繫溜布民煮海為鹽女耕織為業夀多至百有餘嵗地産大布手巾木綿貿易之貨用鐵鼎五色布之屬東淡邈臯揵相去有間近希苓數日程山瘠民間田沃稻登百姓充給氣候熱俗重耕牛每於二月舂米為餅以飼之名為報耕種之本男女椎髻繫八丹布煮海為鹽釀椰漿為酒有酋長地産胡椒亞於闍婆玳瑁木綿大檳榔貿易之貨用銀五色布銅鼎鐵器燒珠之屬大八丹國居西洋之後名雀婆嶺相望數百里田平豐稔時雨霑渥近年田中生叢􅬘丈有餘長􅬘莖四十有八榖粒一百三十長半寸許國人傳玩以為􅬘王民掘􅬘土移至酋長之家一嵗之上莖不枯槁後其穗自墜色如金養之以檳榔灰使其不蛀逮今存其國時出曝之以為寶焉氣候熱俗淳男女短髮穿南溜布煮海為鹽地産綿布婆羅蜜貿易之貨用南絲鐵條紫粉木梳白糖之屬加里那國近具山其地磽確田瘠榖少王國之亞波下有石穴深邃有白牛種每嵗逢春産白牛仍有雌雄酋長畜之名官牛聼其自然孳育於國酋長以其繁衍因之互市國得金十兩厥後牛遂不産氣候稍熱風俗淳厚男女髠髮穿長衫煮井為鹽釀椰漿為酒地産綿羊高大者二百餘斤逢春則割其尾用畨藥搽之次年其尾復生如故貿易之貨用青白花碗細絹鐵條蘇木水銀之屬土塔居八丹之平原赤石圍繞有土磚甃塔髙數丈漢字書云咸淳三年八月畢工傳聞中國之人其年販彼為書於石以刻之至今不磨滅焉土瘠田少氣候半熱秋冬微冷俗好善民間多事桑香聖佛以金銀器皿事之男女斷髮其身如漆繫以白布有酋長地産綿布花布大手巾檳榔貿易之貨用糖霜五色絹青縀蘇木之屬第三港古號為淵今名新港口岸分南北民結屋而居田土氣候俗男女與八丹同去此港八十餘里洋名大郎蚌珠海內為最富采取之際酋長殺人及十數牲祭海神選日集舟人採珠每舟以五人為率二人蕩槳二人收綆其一人用圈竹匡其袋口懸於頸上仍用收綆繫石於腰放墜海底以手爬珠蚌入袋中遂執綆牽掣其舟中之人收綆人隨綆而上才以珠蚌傾舟中既滿載則官場周回皆官兵守之越數日候其肉腐爛則去其殼以羅盛腐肉旋轉洗之則肉去珠存仍巨細篩閲於十分中官抽一半以五分與舟人均分若失海神以取之入水者多葬於鰐魚之腹吁得之良可憫也舶人幸當其取之嵗往往以金與之互易歸則樂數倍之利富可立致特幸逢其時耳華羅揎椰樹為疆理疊青石為室田土瘠磽宜種稻氣候常熱秋冬草木越增茂盛俗怪民間每創石亭數四塑以泥牛或刻石為像朝夕諷經敬之若神佛焉仍以香花燈燭為之供養凡所主之壇所行之地及屋壁之上悉以牛糞和泥塗之反為潔净鄰人往來茍非其類則不敢造其所男女形黑無酋長年尊者主之語言陟加反詉女加反以檀香牛糞搽其額以白細布纒頭穿長衫與今之南毗人少異而大同麻那里界迷黎之東南居垣角之絶島石有楠樹萬枝周圍皆水有蠔如山立人少至之土薄田瘠氣候不齊俗侈男女辮髮以帶捎臂用金絲穿五色絹短衫以朋加剌布為獨幅裙繫之地産駱駝髙九尺土人以之負重有仙鶴髙六尺許以榖為食聞人拍掌則聳翼而舞其容儀可觀亦異物也加將門里去加里二千餘里喬木成林修竹髙節其地堰潴田肥美一嵗三收榖通商販於他國氣候常熱俗薄男女挽髻穿長衫叢雜回人居之其土商每興販黑往朋加剌互用銀錢之多寡隨其大小高下而議價民煮海為鹽釀漿為酒有酋長地産象牙兜羅綿花布貿易之貨用蘇杭五色縀南北絲土綢絹巫崙布之屬波斯離境與西夏聨屬地方五千餘里關市之間民比居如魚鱗田宜麥􅬘氣候常冷風俗侈麗男女長身編髮穿駝褐毛衫以軟錦為茵褥燒羊為食煮海為鹽有酋長地産琥珀軟錦駝毛腽肭臍沒藥萬年棗貿易之貨用氊毯五色縀雲南葉金白銀倭鐵大風子牙梳鐵器逹剌斯離香之屬撻吉那國居逹里之地即古之西域山少而瘠氣候半熱天常隂晦俗與羌同男女身靣如漆眼圓白髮鬅鬙籠軟錦為衣女資紡績為生男採鴉鶻石為活煮海為鹽釀安石榴為酒有酋長地産安息香琉璃瓶硼砂梔子花尤勝於他國貿易之貨用沙金花銀五色縀鐵鼎銅線琉磺水銀之屬千里馬北與大奮山截界溪水護布四時澄徹形勢寬容田瘠榖少氣候乍熱俗淳男女斷髮身繫絲布煮海為鹽釀桂屑為酒有酋長地産翠羽百合蘿蕷貿易之貨用鐵條粗碗蘇木鉛針之屬大佛山大佛山介子迓里髙郎步之間至順庚午冬十月有二日因䣃帆於山下是夜月明如晝海波不興水清徹底起而徘徊俯窺水國有樹婆娑余指舟人而問此非清琅玕珊瑚珠者耶曰非也此非月中娑羅樹影者耶曰亦非也命童子入水中採之則柔滑拔之出水則堅如鐵把而玩之髙僅盈尺則其樹槎牙盤結竒怪枝有一花一蘂紅色天然既開者倣佛牡丹半吐者類乎菡蓞舟人秉燭環堵而觀之衆乃雀躍而笑曰此瓊樹開花也誠海中之稀有亦中國之異聞余歷此四十餘年未嘗有覩於此君今得之兹非千載而一遇者乎余次日作古體詩一首以記其實袖之以歸豫章邵庵虞先生見而賦詩逮今留於君子堂以傳玩焉須文那國居班支尼那接境山如瓜瓠民樂奠居田瘠穀少氣候應節俗鄙薄男女蓬頭繫絲布酋長之家有石鶴髙七尺餘身白而頂紅宛然生像民間事之為神鶴四五月間聼其夜鳴則是嵗豐稔凡有疾則卜之如響斯應民不善煮海為鹽地産絲布胡椒亞於希苓淡邈孩兒茶又名烏爹土又名胥實考之其實檳榔汗也貿易之貨用五色細縀青縀豆䓻大小水罐蘇木之屬萬里石塘石塘之骨由潮州而生迤邐如長蛇橫亘海中越海諸國俗云萬里石塘以余推之豈止萬里而已哉舶由玳嶼門掛四帆乘風破浪海上若飛至西洋或百日之外以一日一夜行百里計之萬里曽不足故源其地脉歷歷可考一脉至瓜哇一脉至勃泥及古里地悶一脉至西洋極崑崙之地蓋紫陽朱子謂海外之地與中原地脉相連者其以是歟觀夫海洋泛無涯涘中匿石塘孰得而明之避之則吉遇之則凶故子午針人之命脉所係茍非舟子之精明能不覆且溺矣吁得意之地勿再往豈可以風濤為徑路也哉小㖵喃地與都攔礁相近厥上黑墳本宜榖麥居民懶事耕作嵗籍烏爹運米供給或風信到遲馬船已去貨載不滿風信或逆不得過喃哩洋且防髙浪阜中鹵股石之厄所以此地駐冬候下年八九月馬船復來移船回古里佛互市風俗男女衣著與古里佛同有村主無酋長地産胡椒椰子檳榔溜魚貿易之貨用金錢青白花器八丹布五色縀鐵器之屬古里佛當巨海之要衝去僧加剌密邇亦西洋諸馬頭也山橫而田瘠宜種麥每嵗藉烏爹米至行者讓路道不拾遺俗稍近古其法至坦盜一牛酋以牛頭為凖失主仍以犯人家産籍沒而戮之官場居深山中海濵為市以通貿易地産胡椒亞於下里人間居有倉廪貯之每播荷三百七十五斤稅收十分之二以下次加張葉皮桑布薔薇水波羅蜜孩兒茶其珊瑚真珠乳香諸等貨皆由甘理佛朗來也去貨與小㖵喃國同畜好馬自西極來故以舶載至此國每匹互易動金錢千百或至四十千為率否則畨人議其國空乏也朋加剌五嶺崔嵬樹林拔萃民環而居之嵗以耕植為業故野無曠土田疇極美一嵗凡三收榖百物皆亷即古欣都州府也氣候常熱風俗最為淳厚男女以細布纒頭穿長衫官稅以十分中取其二焉其國鑄銀錢名唐加每錢八分重流通使用互易􅖝子一萬五百二十有餘以權小錢便民良有益也産苾布髙你布兜羅綿翠羽貿易之貨用南北絲五色絹縀丁香豆䓻青白花器白纓之屬兹畨所以民安物泰者平日農力有以致之是故原防管茅之地民墾闢種植不倦犁鐮勞苦之役因天之時而分地利國富俗厚可以軼舊港而邁闍婆云巴南巴西國居大響山之南環居數十里土瘠宜種豆氣候乍凉俗尚澆薄男女體小而形黑眼圓耳長手垂過膝身披絲絨單被凡民間女子其形㝞於加切􅯼若加切自七嵗父母以歌舞教之身摺疊而圓轉變態百出粗有可觀倘適他國呈其藝術則豫以小錢為賞地産細綿布舶人以錫易之放拜居巴隘亂石之間渡橋出入周圍無田平曠皆陸地宜種麥氣候常暖風俗質朴男女靣長目反白容黑如漆編髮為繩穿斜紋木綿長衫煮海為鹽煆鵝卵石為炭以代炊有酋長地産絶細布匹濶七尺長丈餘大檳榔為諸畨之冠貨用金􅖝子紅白燒珠之屬大烏爹國近巴南之地介西洋之中峯山多鹵股田雜沙土有黑嵗宜種豆氣候常熱俗尚淳男女身修長女生髭穿細布繫紅絹梢女善戰使摽鎗批竹矢毒於蛇他國人極畏之乃以金錢魚兼􅖝子使用煮海為鹽以逡巡法釀酒有酋長地産布匹猫兒眼睛鴉鶻石翠羽貿易之貨白銅鼓板五色縀金銀鐵器之屬國以􅖝子金錢流通使用所以便民也成周之世用錢幣漢武造皮幣鑄白銀無非子母相權而已如西洋諸畨國鑄為大小金錢使用與中國銅錢異雖無其幣以兼之得非法古之道者歟萬年港凌門正灣為之引從倣佛相望中間長濶二十餘丈其深無底魚龍之淵藪也旁有山如氐民環而居田寬地窄宜榖麥氣候常熱俗朴男女椎髻繫青布捎煮海為鹽釀蔗漿為酒有酋長地産降真條木綿黃蠟貿易之貨用鐵條銅線土印花布瓦瓶之屬馬八兒嶼控西北之隅居加將門之右瀕山而居土鹹田沃饒嵗倍收氣候熱俗淫男女散髮以椰葉蔽羞不事緝織鑿井煮海為鹽釀椰漿為酒無酋長地産羽細布大羊百有餘斤榖米價亷貿易之貨用砂金青縀白礬紅緑燒珠之屬次曰拔忽曰里逹那曰骨里傍曰安其曰伽忽皆屬此國之節制焉阿思里極西南逹國里之地無山林之限風起則飛沙撲靣人不敢行居人編竹以蔽之氣候熱半年之間多不見雨掘井而飲深至二三百丈味甘而美其地防原宜種麥或潮水至原下則其地土潤麥苖自秀俗惡男女編髮以牛毛為繩接髮梢至齊膝為竒以鳥羽為衣搗麥做餅為食民不善煮海為鹽地産大綿布小布匹貿易之貨用銀鐵器青燒珠之屬哩伽塔國居遼西之界乃國王海之濵田瘠宜種黍民疊板石為居掘地丈有餘深以藏種子雖三載亦不朽也氣候秋熱而夏凉俗尚朴男女瘦長其形古怪髮長二寸而不見長穿布桶衣繫皂布梢煮海為鹽釀黍為酒以牛乳為食地産青琅玕珊瑚樹其樹或長一丈有餘或七八尺許一尺有餘秋冬民間皆用船採取以橫木繫破網及紗線於其上仍以索縳木兩頭人於船上牽以拖之則其樹槎牙掛挽而上貿易之貨用金銀五色縀巫崙布之屬天堂地多曠漠即古筠冲之地又名為西域風景融和四時之春也田沃稻饒居民樂業雲南有路可通一年之上可至其地西洋亦有路通名為天堂有回回厯與中國授時厯前後只爭三日其選日永無差異氣候暖風俗好善男女辮髮穿細布布衫繫細布梢地産西馬髙八尺許人多以馬乳拌飯為食則人肥美貿易之貨用銀五色縀青白花器鐵鼎之屬天竺居大食之東𨽻秦王之主去海二百餘里地平沃氣候不齊俗有古風男女身長七尺小目長項手帕繫額編髮垂耳穿百闕皮織鞋以綿紗結襪仍將穿之示其執禮也不善煮海為鹽食仰他國民間以金錢流通使用有酋長地産沙金駿馬貿易之貨用銀青白花器斗錫酒色印布之屬層搖羅國居大食之西南崖無林地多淳田瘠榖少故多種薯以代糧食每貨販於其地者若有榖米與之交易其利甚溥氣候不齊俗古直男女挽髮穿無縫短裙民事網罟取禽獸為食煮海為鹽釀蔗漿為酒有酋長地産紅檀紫蔗象齒龍涎生金鴨觜膽礬貿易之貨用牙箱花銀五色縀之屬馬魯澗國與遐邇沙喃之後山接壤民樂業而富周回廣一萬八千餘里西洋國悉臣屬焉有酋長元臨漳人陳其姓也幼能讀書長練兵事國初領兵鎮甘州遂入此國討境不復返兹地産馬故多馬軍動侵畨國以兵凡若干萬歲以正月三日則建髙壇以受兵賀所至之地即成聚落一所民間互易而卒無擾攘之患蓋以刑法之重如此觀其威逼諸畨嚴行賞罰亦酋豪中之表表者乎甘埋里闕南馮之地與佛郎相近乘風張帆二月可至小㖵喃其闕為馬船大於商舶不使釘灰用椰索板成片每舶二三闕板橫棧滲漏不勝稍人日夜輪戽水不枯竭下以乳香壓重上載馬數百匹頭小尾輕鹿身吊肚四蹄削鐵髙七尺許日夜可行千里所有木香琥珀之類地産自佛郎國來商販於西洋互易去貨丁香豆䓻青縀麝香紅色燒珠蘇杭色縀蘇木青白花器瓷瓶鐵條以胡椒載而返椒之所以貴者皆因此船運去尤多較商舶之取十不及其一焉麻呵斯離去大食國八千餘里與鯨板奴國相近由海通溪約二百餘里石道﨑嶇至官場三百餘里地平如席氣候應節風俗鄙儉男女編髮眼如銅鈴穿長衫煮海為鹽釀老葉為酒有酋長地産青鹽馬乳葡萄米麥其麥粒長半寸許甘露每嵗八九月下民間築净池以盛之旭日曝則融結如氷味甚糖霜仍以瓷器貯之調湯而飲以辟瘴癘古云甘露王如來即其地也貿易之貨用剌速斯離布紫金白銅青珢玕闍婆布之屬羅婆斯闕那之右山聨屬竒峯磊磊如天馬奔馳形勢臨海闕不織不衣以鳥羽掩身食無烟火惟有茹毛飲血巢居闕雖然飲食宫室節宣之不可缺也絲麻絺紵寒暑之闕違也夫以洛南北之地懸隔千里尚有寒暑之殊而况於闕諸國者哉其地鐘湯之全故民無衣服之備陶然自適以宇宙輪輿宜乎茹飲不擇巢穴不易相與游乎太古之天矣烏爹國因伽里之舊名也山林益少其地堰潴而半曠民專農業田沃稼茂既絶稂莠之害又無蝗蝻之災嵗凡三稔諸物皆亷道不拾遺鄉里和睦士尤尚義俗厚民泰各畨之所不及也氣候男女與朋加剌略同稅收十分之一也地産大者黑國翠羽黃蠟木綿細匹布貿易之貨用金銀五色縀白絲丁香豆䓻茅香青白花器鼓瑟之屬每個銀錢重二錢八分准中統鈔一十兩易􅖝子計一萬一千五百二十有餘折錢使用以二百五十􅖝子糴一尖羅熟米折官斗有一斗六升每錢收􅖝子可得四十六羅米通計七十三斗二升可供二人一嵗之食有餘故販其地者十去九不還也夫以外夷而得知務農重榖使國闕民故家給人足嵗無饑寒之憂設之興行禮讓教以詩闕則與中國之風無間然矣孰謂蠻貊之邦而不可行者異聞類聚闕國之民能為飛車從風遠行見於博物志矣次曰頓闕人死送於郭外鳥食肉盡乃去以火燒其骨即沉於海中謂之鳥葬見於窮神祕苑矣次曰骨利國晝長夜短薄暮煮一羊胛方熟東方已曙見於神異録矣次曰大食國山樹花開如人首不解語人借問惟頻笑笑則雕落見於酉陽雜爼矣次曰婆登國種榖每月一熟見於神異之記次曰繳濮國人有尾欲坐則先穴地以安之誤折其尾則死見於廣州之記次曰南方之産翁獠婦子是擁衾抱雛以護衛之見於南楚之新聞次畨禺縣民灾𬞞園盜之於百里之外若浮筏乘流於海上有縣宰為之判杖見於玉堂之間話他如女人國視井而生育茶弼沙國入其地聲震雷霆至於南方縳婦成姻多非禮聘嶺南之好女不事緝織南海之貧妻名為腹指賣南中之師郎擁婦而食肉此又人物風俗之不同録之以偹采覽故曰異聞類聚島夷志後序皇元混一聲教無遠弗届區宇之廣曠古所未聞海外島夷無慮數千國莫不執玉貢琛以修民職梯山航海以通互市中國之往復商販於殊庭異域之中者如東西州焉大淵少年嘗附舶以浮於海所過之地竊嘗賦詩以記其山川土俗風景物産之詭異與夫可怪可愕可鄙可笑之事皆身所遊覽耳目所親見傳說之事則不載焉至正己丑冬大淵過泉南適監郡偰侯命三山吳鑒明之續清源郡志願以清源舶司所在諸畨輻輳之所宜記録不鄙謂余方知外事屬島夷志附於郡志之後非徒以廣士大夫之異聞蓋以表國朝威德如是之大且遠也島夷志略島夷志略跋皇明嘉靖戊申五月望汝南郡考島夷惟日本重文事其髹漆金器刀紙屏障最精此志不載故及之豫於正德初年因本國使臣朝貢留寓姑蘇其正使了菴年已八十八詩禮𢋫酬尚在陶齊袁表識
